services:
  web:
    image: nginx
    ports:
      - "${PROJECT_PORT}:80"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/conf.d/default.conf
      - ./:/var/www/html
    networks:
        - app-network


  php-fpm:
    build: ./docker/php
    volumes:
      - ./:/var/www/html
      - ./docker/php/Xdebug.ini:/usr/local/etc/php/conf.d/docker-php-xdebug.ini
    networks:
        - app-network


  postgres:
    image: postgres:16
    volumes:
      - ./docker/postgres/data:/var/lib/postgresql/data
    environment:
        - POSTGRES_DB=${DB_DATABASE}
        - POSTGRES_USER=${DB_USERNAME}
        - POSTGRES_PASSWORD=${DB_PASSWORD}
    ports:
      - "${DB_PORT}:5432"
    networks:
        - app-network

networks:
    app-network:
        driver: bridge

